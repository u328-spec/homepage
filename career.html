<!DOCTYPE html>
<html lang="ko">
<head>

  <title>TRIPLE COMMA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="favicon.png" type="image/png" />
  <!-- Pretendard Font -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }
    .logo-invert {
      filter: invert(1);
      transition: filter 0.3s ease;
    }
    header.scrolled .logo-invert {
      filter: none;
    }
    header.scrolled {
      background-color: white;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
    }
    header.scrolled nav,
    header.scrolled nav a {
      color: #151515;
    }
    .mega-menu {
      opacity: 0;
      visibility: hidden;
      transform: translate(-50%, -8px);
      transition: opacity 0.2s, transform 0.2s, visibility 0.2s;
    }
    .service-trigger:hover .mega-menu {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, 0);
    }
    .mobile-menu-btn span {
      background-color: white;
      transition: background-color 0.3s ease;
    }
    header.scrolled .mobile-menu-btn span {
      background-color: #151515;
    }
    #mobile-menu .mobile-service-trigger[aria-expanded="true"] {
      background-color: #f5f5f5;
    }
    #mobile-menu .mobile-nav-item {
      border-radius: 0.5rem;
      transition: background-color 0.15s ease;
    }
    #mobile-menu .mobile-nav-item:hover {
      background-color: #f0f0f0;
    }
    #mobile-menu .mobile-nav-item:active {
      background-color: #e5e5e5;
    }
    @keyframes bg-zoom-in {
      0% { transform: scale(1); }
      100% { transform: scale(1.08); }
    }
    .bg-zoom-animate {
      transform-origin: center center;
      animation: bg-zoom-in 12s linear forwards;
    }
  </style>
</head>
<body>
  <!-- 채용 Hero Section -->
  <section class="relative min-h-screen overflow-hidden">
    <!-- 배경 이미지 - 확장 애니메이션 -->
    <div class="bg-zoom-animate absolute inset-0 -z-10">
      <img src="bg_career.jpg" alt="" class="h-full w-full object-cover object-center" />
    </div>
    
    <!-- 고정 헤더 (공통) -->
    <div id="site-header"></div>
    <script src="includes/header.js"></script>

    <!-- 중앙 텍스트 영역 -->
    <div class="flex min-h-screen flex-col items-center justify-center px-5 text-center md:px-6">
      <h1 class="mb-6 text-2xl font-bold leading-tight text-white md:text-5xl lg:text-6xl" style="line-height: 140%;">
        서비스를 넘어 인생을 바꾸는 여정,<br />도전에 함께할 동료를 찾습니다
      </h1>
      <a href="https://www.wanted.co.kr/company/8040" target="_blank" rel="noopener noreferrer" class="rounded-full bg-neutral-200 px-8 py-3 text-base font-medium text-[#151515] transition hover:bg-neutral-300 md:px-10 md:py-3.5 md:text-lg">
        지금 합류하기
      </a>
    </div>
  </section>

  <!-- 푸터 -->
  <footer class="px-5 py-14 md:px-12 md:py-16 lg:px-16" style="--footer-dark: #4B4B4B; --footer-light: #9A9A9A; background-color: #fafafa;">
    <div class="mx-auto max-w-5xl">
      <div class="mb-5">
        <a href="index.html" class="mb-[18px] block w-fit">
          <img src="logo_triplecomma.svg" alt="TRIPLE COMMA" class="h-3.5 md:h-4" />
        </a>
        <div class="space-y-0 text-xs leading-snug md:space-y-0.5 md:text-sm md:leading-relaxed" style="color: var(--footer-dark);">
          <p>(주)트리플콤마</p>
          <p>서울특별시 강남구 테헤란로 447, 13층(KB우준타워)</p>
          <p>대표 천우영</p>
        </div>
      </div>
      <div class="mb-6 inline-flex w-fit flex-row flex-wrap items-center gap-3 rounded-lg px-5 py-2.5 shadow-sm sm:gap-4" style="color: var(--footer-dark); background-color: #F4F4F4;">
        <img src="img_isms.png" alt="ISMS 인증" class="h-8 w-auto shrink-0 sm:h-10" />
        <div class="flex min-w-0 flex-col gap-0.5 text-xs sm:flex-row sm:items-center sm:gap-4 md:text-sm">
          <span>인증번호 ISMS-P-KISA-2026-009</span>
          <span class="hidden text-neutral-300 md:inline">|</span>
          <span>유효기간 2026-02-04 ~ 2029-02-03</span>
        </div>
      </div>
      <hr class="mb-4 border-neutral-200" />
      <div class="flex flex-col gap-0.5 text-[11px] md:flex-row md:flex-wrap md:items-center md:gap-3 md:text-xs" style="color: var(--footer-light);">
        <span>사업자등록번호 567-81-00991</span>
        <span class="hidden text-neutral-300 md:inline">|</span>
        <span>결혼중개업 신고 필증 번호 서울-강남-국내-24-0007호</span>
        <span class="hidden text-neutral-300 md:inline">|</span>
        <span>© Copyright 2025. Triplecomma Inc. All right reserved</span>
      </div>
    </div>
  </footer>

</body>
</html>
